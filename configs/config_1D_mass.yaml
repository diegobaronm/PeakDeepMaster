general:
  mode: train
  device: cuda
  seed: 42

logging:
  level: INFO
  format: '%(asctime)s | %(levelname)s | %(name)s | %(message)s'
  datefmt: '%Y-%m-%d %H:%M:%S'
  colors: auto
  file: null
  capture_warnings: true
  events_to_log_in_debug: [0, 1000, 200000]
  train:
    output_dir: training_logs
    experiment_name: 1D_mass_PN

dataset:
  input_h5_path: data/Mass_Inference_negW.h5
  max_events_per_parameter: 800000
  observables:
    - EVENT_PARTICLES: top1_pt
      transformation: LogScaler
    - EVENT_PARTICLES: top2_pt
      transformation: LogScaler
    - EVENT_PARTICLES: top1_eta
      transformation: StandardScaler
    - EVENT_PARTICLES: top2_eta
      transformation: StandardScaler
    - EVENT_GLOBAL: mttbar
      transformation: StandardScaler
  parameters:
    - EVENT_GLOBAL: hmass
      transformation: MinMaxScaler
      values_for_training: [600.0, 700.0, 800.0, 900.0, 1000.0]
      values_for_testing: [650.0, 870.0]
  weights:
    - EVENT_GLOBAL: lumiWeight
  train:
    num_workers: 10
    batch_size: 10240
  val:
    num_workers: 10
    batch_size: 10240


model:
  hidden_dim: 64
  dropout: 0.05

train:
  n_epochs: 160
  learning_rate: 0.0002
  weight_decay: 0.001
  lr_patience: 10
  lr_factor: 0.8
  signal_weight_sign: positive
  background_weight_sign: positive
  compile: false

predict:
  checkpoint_path: lightning_logs/version_0/checkpoints/
  output_file: results/predictions.csv

performance:
  checkpoint_path: training_logs/1D_mass_PP/version_0/checkpoints/
  output_dir: results/performance/1D_mass_PP/
  batch_size: 10240

inference:
  output_dir: results/inference/mass_870_zoom
  model_pp_checkpoint: training_logs/1D_mass_PP/version_0/checkpoints/
  model_pn_checkpoint: training_logs/1D_mass_PN/version_0/checkpoints/
  observable: mttbar
  rosmm_sign: -1.0
  truth_parameter: 870.0
  theta_min: 870.7
  theta_max: 871.9
  n_points: 100
  n_pseudo_experiments: 1000
  pseudo_experiment_confidence: 0.95
